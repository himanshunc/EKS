# CI Pipeline — Frontend service
#
# Identical flow to ci-api.yml but for the frontend container.
# Triggered by changes to apps/frontend/ source files.

name: CI — Frontend

on:
  push:
    branches: [main]
    paths:
      - "apps/frontend/**"

permissions:
  id-token: write
  contents: write

jobs:
  build-and-push:
    name: Build, push, update manifest
    runs-on: ubuntu-latest

    env:
      AWS_REGION:     ${{ vars.AWS_REGION }}
      AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
      ECR_REPO:       gitops-dev-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image metadata
        id: meta
        run: |
          SHA=$(git rev-parse --short HEAD)
          IMAGE="${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO }}"
          echo "sha=${SHA}"           >> $GITHUB_OUTPUT
          echo "image=${IMAGE}"       >> $GITHUB_OUTPUT
          echo "full=${IMAGE}:${SHA}" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build \
            --tag "${{ steps.meta.outputs.full }}" \
            --tag "${{ steps.meta.outputs.image }}:latest" \
            apps/frontend/

      - name: Push to ECR
        run: |
          docker push "${{ steps.meta.outputs.full }}"
          docker push "${{ steps.meta.outputs.image }}:latest"
          echo "Pushed ${{ steps.meta.outputs.full }}"

      - name: Update image tag in k8s manifest
        run: |
          NEW_IMAGE="${{ steps.meta.outputs.full }}"

          sed -i \
            "s|image: .*gitops-dev-frontend:.*|          image: ${NEW_IMAGE}|" \
            k8s/apps/frontend/deployment.yaml

          echo "Updated deployment to: ${NEW_IMAGE}"

      - name: Commit and push manifest update
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add k8s/apps/frontend/deployment.yaml

          if git diff --staged --quiet; then
            echo "No manifest changes to commit"
          else
            git commit -m "ci: update frontend image to ${{ steps.meta.outputs.sha }} [skip ci]"
            git push origin main
            echo "Manifest updated — ArgoCD will sync shortly"
          fi
