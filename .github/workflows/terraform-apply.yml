name: Terraform Apply

# Runs when infra changes are merged/pushed to main.
# Flow: init + plan → wait for manual approval → apply
#
# The "plan" job runs first and posts the plan output as a summary.
# The "apply" job is gated behind the "production" GitHub Environment —
# go to Actions → this run → Review deployments → Approve to proceed.
#
# Setup: GitHub repo → Settings → Environments → production
#        Add yourself as a required reviewer.

on:
  push:
    branches: [main]
    paths: ["Infra/**"]
  workflow_dispatch:  # manual trigger — use when infra was destroyed and needs a full apply

jobs:

  # ── Job 1: Plan ────────────────────────────────────────────────────────────
  # Runs terraform init + plan and posts the output as a workflow summary.
  # No AWS changes are made at this stage.
  plan:
    name: terraform plan
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.0"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.TF_ROLE_ARN }}
          aws-region: ap-south-1

      - name: Terraform init
        run: terraform init
        working-directory: Infra/environments/dev

      - name: Terraform plan
        run: terraform plan -no-color 2>&1 | tee /tmp/tfplan.txt
        working-directory: Infra/environments/dev

      # Post plan to the workflow summary so the approver can review it
      # before clicking Approve in the apply job below.
      - name: Post plan to summary
        run: |
          echo '### Terraform Plan' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/tfplan.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  # ── Job 2: Apply ───────────────────────────────────────────────────────────
  # Waits for manual approval via the "production" GitHub Environment.
  # Approver should review the plan summary above before approving.
  apply:
    name: terraform apply
    runs-on: ubuntu-latest
    needs: plan          # only runs after plan job completes successfully
    environment: production   # pauses here — reviewer clicks Approve in GitHub UI
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.0"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.TF_ROLE_ARN }}
          aws-region: ap-south-1

      - name: Terraform init
        run: terraform init
        working-directory: Infra/environments/dev

      # -auto-approve is correct here — the human approval already happened
      # via the GitHub Environment gate above. This flag just skips the
      # interactive "yes/no" prompt inside terraform itself.
      - name: Terraform apply
        run: terraform apply -auto-approve
        working-directory: Infra/environments/dev
