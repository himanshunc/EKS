name: Terraform Apply

# Runs when infra changes are merged to main.
# Requires manual approval via the "production" GitHub Environment
# (Settings → Environments → production → add yourself as a required reviewer).

on:
  push:
    branches: [main]
    paths: ["Infra/**"]

jobs:
  apply:
    name: terraform init + apply
    runs-on: ubuntu-latest
    environment: production   # pauses here until a reviewer approves in GitHub UI
    permissions:
      id-token: write   # OIDC token for AWS auth
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.0"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.TF_ROLE_ARN }}
          aws-region: ap-south-1

      # ── Init ──────────────────────────────────────────────────────────────
      # Downloads providers and connects to the S3 remote backend.
      # backend.tf is already committed in Infra/environments/dev/.
      - name: Terraform init
        run: terraform init
        working-directory: Infra/environments/dev

      # ── Apply ─────────────────────────────────────────────────────────────
      # Applies the full stack. Takes ~15-20 min on a fresh cluster.
      # Safe to run on incremental changes — Terraform only touches what changed.
      - name: Terraform apply
        run: terraform apply -auto-approve
        working-directory: Infra/environments/dev
