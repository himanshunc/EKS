name: CI — Nodeapp

# Branch → Environment mapping:
#   develop → dev  (image tag: dev-SHA, updates k8s/nodeapp/deployment.yaml)
#   main    → prod (image tag: prod-SHA, updates k8s/nodeapp/deployment.yaml)
#
# NOTE: nodeapp uses raw manifests (single deployment.yaml).
# For full env isolation with separate manifest files per env,
# see the multi-repo setup (new project).

on:
  push:
    branches: [main, develop]
    paths:
      - "apps/nodeapp/**"
  workflow_dispatch:

permissions:
  id-token: write   # OIDC token for AWS auth
  contents: write   # push manifest update back to branch

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Detect Environment ─────────────────────────────────────────────────
      - name: Set environment
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "ENV=prod" >> $GITHUB_ENV
          else
            echo "ENV=dev"  >> $GITHUB_ENV
          fi

      # ── Lint ──────────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dev dependencies
        run: npm install
        working-directory: apps/nodeapp

      - name: Lint
        run: npm run lint
        working-directory: apps/nodeapp

      # ── Unit Tests ────────────────────────────────────────────────────────
      - name: Unit tests
        run: npm test
        working-directory: apps/nodeapp

      # ── Build Docker image ────────────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build image
        run: |
          SHA=$(git rev-parse --short HEAD)
          IMAGE="${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/gitops-dev-worker"

          # Tag with env prefix so dev and prod images are clearly distinguishable in ECR
          docker build \
            -t ${IMAGE}:${{ env.ENV }}-${SHA} \
            -t ${IMAGE}:${{ env.ENV }}-latest \
            apps/nodeapp/

          echo "IMAGE_TAG=${{ env.ENV }}-${SHA}"              >> $GITHUB_ENV
          echo "IMAGE_FULL=${IMAGE}:${{ env.ENV }}-${SHA}"    >> $GITHUB_ENV
          echo "IMAGE_LATEST=${IMAGE}:${{ env.ENV }}-latest"  >> $GITHUB_ENV

      # ── Security Scan ─────────────────────────────────────────────────────
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref:      ${{ env.IMAGE_FULL }}
          format:         table
          exit-code:      '1'
          ignore-unfixed: true
          severity:       'CRITICAL'

      # ── Push to ECR ───────────────────────────────────────────────────────
      - name: Push image to ECR
        run: |
          docker push ${{ env.IMAGE_FULL }}
          docker push ${{ env.IMAGE_LATEST }}

      # ── Update manifest ───────────────────────────────────────────────────
      - name: Update manifest
        run: |
          sed -i "s|image: .*gitops-dev-worker:.*|image: ${{ env.IMAGE_FULL }}|" k8s/nodeapp/deployment.yaml

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/nodeapp/deployment.yaml
          if git diff --staged --quiet; then
            echo "No manifest changes — skipping commit"
          else
            git commit -m "ci: deploy nodeapp ${{ env.IMAGE_TAG }} [${{ env.ENV }}] [skip ci]"
            git pull --rebase origin ${{ github.ref_name }}
            git push origin ${{ github.ref_name }}
          fi
