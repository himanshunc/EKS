name: Terraform Plan

# Runs on every PR that touches infra/ — posts the plan as a PR comment.
# This gives reviewers a clear picture of what will change before merging.

on:
  pull_request:
    branches: [main, develop]
    paths: ["Infra/**"]

jobs:
  plan:
    name: fmt + validate + plan
    runs-on: ubuntu-latest
    permissions:
      id-token: write       # OIDC token for AWS auth (no static keys)
      contents: read
      pull-requests: write  # post plan output as a PR comment

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.0"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.TF_ROLE_ARN }}
          aws-region: ap-south-1

      # ── Format check ──────────────────────────────────────────────────────
      # Does not block — result is reported in the PR comment below.
      - name: Terraform fmt
        id: fmt
        run: terraform fmt -check -recursive
        working-directory: Infra/environments/dev
        continue-on-error: true

      # ── Init ──────────────────────────────────────────────────────────────
      # Downloads providers and connects to the S3 backend.
      # backend.tf is already committed in Infra/environments/dev/.
      - name: Terraform init
        id: init
        run: terraform init
        working-directory: Infra/environments/dev

      # ── Validate ──────────────────────────────────────────────────────────
      - name: Terraform validate
        id: validate
        run: terraform validate -no-color
        working-directory: Infra/environments/dev

      # ── Plan ──────────────────────────────────────────────────────────────
      # continue-on-error so the PR comment is always posted even if plan fails.
      - name: Terraform plan
        id: plan
        run: terraform plan -no-color -out=tfplan
        working-directory: Infra/environments/dev
        continue-on-error: true

      # ── Post plan as PR comment ───────────────────────────────────────────
      - name: Post plan to PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `### Terraform Plan

            | Step | Result |
            |------|--------|
            | Format | \`${{ steps.fmt.outcome }}\` |
            | Init   | \`${{ steps.init.outcome }}\` |
            | Validate | \`${{ steps.validate.outcome }}\` |
            | Plan   | \`${{ steps.plan.outcome }}\` |

            <details><summary>Show full plan</summary>

            \`\`\`terraform
            ${{ steps.plan.outputs.stdout }}
            \`\`\`
            </details>

            *Triggered by @${{ github.actor }} on \`${{ github.event_name }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1
