name: Terraform Plan

on:
  pull_request:
    branches: [main, develop]
    paths: ["infra/**"]

jobs:
  plan:
    name: Terraform Format + Validate + Plan
    runs-on: ubuntu-latest
    permissions:
      id-token: write       # required for OIDC auth to AWS (no static keys)
      contents: read
      pull-requests: write  # allows posting the plan as a PR comment

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.0"

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-south-1

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        working-directory: infra/environments/dev
        continue-on-error: true  # report failure but don't block — comment shows result

      - name: Terraform Init
        id: init
        run: terraform init
        working-directory: infra/environments/dev

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color
        working-directory: infra/environments/dev

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -out=tfplan
        working-directory: infra/environments/dev
        continue-on-error: true

      - name: Post plan as PR comment
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `#### Terraform Format 🖌 \`${{ steps.fmt.outcome }}\`
            #### Terraform Init ⚙️ \`${{ steps.init.outcome }}\`
            #### Terraform Validate 🤖 \`${{ steps.validate.outcome }}\`
            #### Terraform Plan 📖 \`${{ steps.plan.outcome }}\`

            <details><summary>Show Plan</summary>

            \`\`\`terraform
            ${{ steps.plan.outputs.stdout }}
            \`\`\`

            </details>

            *Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1
