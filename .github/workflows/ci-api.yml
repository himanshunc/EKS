# CI Pipeline — API service
#
# Triggered by: push to main that changes apps/api/ source code
# What it does:
#   1. Build the Docker image
#   2. Push to ECR (tagged with the git SHA + "latest")
#   3. Update the image tag in k8s/apps/api/deployment.yaml
#   4. Commit and push the manifest change back to main
#   5. ArgoCD detects the new commit and rolls out the new image
#
# Required GitHub secret:
#   AWS_ROLE_ARN — ARN of the github-actions IAM role (from Terraform output: github_actions_role_arn)
#
# Required GitHub variable (Settings → Variables):
#   AWS_ACCOUNT_ID  — your 12-digit AWS account ID
#   AWS_REGION      — e.g. ap-south-1

name: CI — API

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"   # only trigger when API source changes, not on manifest updates

# Least-privilege permissions for this workflow
permissions:
  id-token: write   # required for OIDC token exchange with AWS
  contents: write   # required to commit the updated manifest back to the repo

jobs:
  build-and-push:
    name: Build, push, update manifest
    runs-on: ubuntu-latest

    env:
      AWS_REGION:     ${{ vars.AWS_REGION }}
      AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
      # ECR repo name matches the Terraform locals: {project_name}-{environment}-{app}
      ECR_REPO:       gitops-dev-api

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Fetch full history so we can push the manifest update commit
          fetch-depth: 0

      # Authenticate to AWS using OIDC — no static credentials stored anywhere.
      # GitHub mints a short-lived OIDC token; AWS exchanges it for temporary credentials.
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # Get the ECR login password and pipe it to docker login
      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image metadata
        id: meta
        run: |
          # Short SHA — 7 chars, unique per commit, human-readable
          SHA=$(git rev-parse --short HEAD)
          IMAGE="${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO }}"
          echo "sha=${SHA}"         >> $GITHUB_OUTPUT
          echo "image=${IMAGE}"     >> $GITHUB_OUTPUT
          echo "full=${IMAGE}:${SHA}" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build \
            --tag "${{ steps.meta.outputs.full }}" \
            --tag "${{ steps.meta.outputs.image }}:latest" \
            --build-arg APP_VERSION="${{ steps.meta.outputs.sha }}" \
            apps/api/

      - name: Push to ECR
        run: |
          docker push "${{ steps.meta.outputs.full }}"
          docker push "${{ steps.meta.outputs.image }}:latest"
          echo "Pushed ${{ steps.meta.outputs.full }}"

      # Update the image tag in the k8s manifest so ArgoCD picks up the new version.
      # sed replaces the image line in-place. The pattern is specific enough to avoid
      # false matches — it targets lines containing the ECR repo name.
      - name: Update image tag in k8s manifest
        run: |
          NEW_IMAGE="${{ steps.meta.outputs.full }}"

          sed -i \
            "s|image: .*gitops-dev-api:.*|          image: ${NEW_IMAGE}|" \
            k8s/apps/api/deployment.yaml

          # Also update APP_VERSION env var so it shows in the API response
          sed -i \
            "s|value: \".*\"  # APP_VERSION placeholder|value: \"${{ steps.meta.outputs.sha }}\"|" \
            k8s/apps/api/deployment.yaml

          echo "Updated deployment to: ${NEW_IMAGE}"

      # Commit the manifest change back to main.
      # The push only touches k8s/apps/api/deployment.yaml, which is NOT in the
      # trigger path (apps/api/**), so this commit does NOT re-trigger the workflow.
      - name: Commit and push manifest update
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add k8s/apps/api/deployment.yaml

          # Only commit if there are changes (avoids empty commits on re-runs)
          if git diff --staged --quiet; then
            echo "No manifest changes to commit"
          else
            git commit -m "ci: update api image to ${{ steps.meta.outputs.sha }} [skip ci]"
            git push origin main
            echo "Manifest updated — ArgoCD will sync shortly"
          fi
