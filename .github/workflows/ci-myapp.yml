name: CI — myapp

# Triggers on changes to the app source.
# Does NOT trigger on changes to helm/ — those are GitOps state, not source code.
#
# Branch → Environment mapping:
#   develop → dev  (updates helm/myapp/values-dev.yaml)
#   main    → prod (updates helm/myapp/values-prod.yaml)

on:
  push:
    branches: [main, develop]
    paths:
      - "apps/myapp/**"
  workflow_dispatch:

permissions:
  id-token: write   # OIDC token for AWS auth (no static keys)
  contents: write   # push image tag update back to branch

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Detect Environment ─────────────────────────────────────────────────
      # develop → dev, main → prod
      # Sets ENV and VALUES_FILE used in later steps.
      - name: Set environment
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "ENV=prod"                                  >> $GITHUB_ENV
            echo "VALUES_FILE=helm/myapp/values-prod.yaml"  >> $GITHUB_ENV
          else
            echo "ENV=dev"                                   >> $GITHUB_ENV
            echo "VALUES_FILE=helm/myapp/values-dev.yaml"   >> $GITHUB_ENV
          fi

      # ── Lint ──────────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dev dependencies
        run: npm install
        working-directory: apps/myapp

      - name: Lint
        run: npm run lint
        working-directory: apps/myapp

      # ── Unit Tests ────────────────────────────────────────────────────────
      - name: Unit tests
        run: npm test
        working-directory: apps/myapp

      # ── Build Docker image ────────────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build image
        run: |
          SHA=$(git rev-parse --short HEAD)
          IMAGE="${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/gitops-dev-api"

          # Tag with env prefix so dev and prod images are clearly distinguishable in ECR
          docker build \
            -t ${IMAGE}:${{ env.ENV }}-${SHA} \
            -t ${IMAGE}:${{ env.ENV }}-latest \
            apps/myapp/

          echo "IMAGE_TAG=${{ env.ENV }}-${SHA}"                  >> $GITHUB_ENV
          echo "IMAGE_FULL=${IMAGE}:${{ env.ENV }}-${SHA}"        >> $GITHUB_ENV
          echo "IMAGE_LATEST=${IMAGE}:${{ env.ENV }}-latest"      >> $GITHUB_ENV

      # ── Security Scan ─────────────────────────────────────────────────────
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref:      ${{ env.IMAGE_FULL }}
          format:         table
          exit-code:      '1'
          ignore-unfixed: true
          severity:       'CRITICAL'

      # ── Push to ECR ───────────────────────────────────────────────────────
      - name: Push image to ECR
        run: |
          docker push ${{ env.IMAGE_FULL }}
          docker push ${{ env.IMAGE_LATEST }}

      # ── Update Helm values ────────────────────────────────────────────────
      # Updates the image tag in the environment-specific values file.
      # develop → values-dev.yaml, main → values-prod.yaml
      # ArgoCD detects the commit on the branch and rolls out the new version.
      - name: Update image tag in Helm values
        run: |
          sed -i "s/^  tag:.*/  tag: ${{ env.IMAGE_TAG }}/" ${{ env.VALUES_FILE }}

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ${{ env.VALUES_FILE }}
          if git diff --staged --quiet; then
            echo "No changes — skipping commit"
          else
            git commit -m "ci: deploy myapp ${{ env.IMAGE_TAG }} [${{ env.ENV }}] [skip ci]"
            git pull --rebase origin ${{ github.ref_name }}
            git push origin ${{ github.ref_name }}
          fi
