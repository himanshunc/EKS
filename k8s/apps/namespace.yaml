# apps Namespace — created by ArgoCD (not Terraform).
# LimitRange and default-deny NetworkPolicy are applied by the cluster_defaults
# Terraform module when "apps" is added to extra_namespaces.
# App-specific NetworkPolicies live alongside each app's manifests.
apiVersion: v1
kind: Namespace
metadata:
  name: apps
  labels:
    app.kubernetes.io/managed-by: argocd
