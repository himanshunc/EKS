# ALB Ingress — single internet-facing load balancer for both apps.
#
# Path routing:
#   /api/*  → api service (port 80 → container 8080)
#   /*      → frontend service (port 80 → container 80)
#
# The ALB controller (deployed by helm_addons) reads these annotations and
# creates/configures an Application Load Balancer in AWS automatically.
#
# After apply, get the ALB DNS name:
#   kubectl get ingress -n apps
# The ADDRESS column shows the ALB DNS name (takes ~2 minutes to provision).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: apps
  namespace: apps
  annotations:
    # Use AWS ALB (not nginx ingress)
    kubernetes.io/ingress.class: alb

    # internet-facing = ALB is publicly accessible from the internet
    # internal        = ALB is only reachable from within the VPC
    alb.ingress.kubernetes.io/scheme: internet-facing

    # ip mode = ALB routes directly to pod IPs (faster, no NodePort hop)
    # instance mode = ALB routes to node IPs + NodePort (simpler but adds a hop)
    alb.ingress.kubernetes.io/target-type: ip

    # Listen on HTTP port 80 only.
    # For HTTPS, add: {"HTTPS": 443} and set alb.ingress.kubernetes.io/certificate-arn
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'

    # Health check settings — ALB polls each pod on these paths.
    # Must return 200 for the target to be considered healthy and receive traffic.
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "15"
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: "5"
    alb.ingress.kubernetes.io/healthy-threshold-count: "2"
    alb.ingress.kubernetes.io/unhealthy-threshold-count: "3"

    # Place the ALB in the public subnets (tagged kubernetes.io/role/elb = 1 by the vpc module)
    alb.ingress.kubernetes.io/subnets: ""  # leave empty — ALB controller auto-discovers from subnet tags
spec:
  rules:
    - http:
        paths:
          # /api/* → API service
          # PathType: Prefix matches /api, /api/, /api/anything
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 80

          # /* → Frontend service (catch-all, must be last)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
