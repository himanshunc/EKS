# NetworkPolicy for the Frontend pod.
---
# Allow inbound HTTP from the VPC (ALB direct-to-pod via target-type: ip).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: frontend-allow-ingress
  namespace: apps
spec:
  podSelector:
    matchLabels:
      app: frontend
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: 80
      from:
        - ipBlock:
            cidr: 10.0.0.0/16
---
# Allow outbound HTTP/HTTPS from the frontend pod.
# nginx itself doesn't make outbound calls, but allow it in case you add a backend proxy.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: frontend-allow-egress
  namespace: apps
spec:
  podSelector:
    matchLabels:
      app: frontend
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 443
          protocol: TCP
        - port: 80
          protocol: TCP
