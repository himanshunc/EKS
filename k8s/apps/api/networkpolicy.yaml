# NetworkPolicy for the API pod.
# The cluster_defaults module applies a default-deny-all policy to the apps namespace.
# This policy adds the specific allow rules the API needs on top of that baseline.
---
# Allow inbound HTTP traffic to the API from the VPC (ALB targets pods directly via IP).
# With ALB target-type=ip, the ALB's source IP is from the VPC CIDR (10.0.0.0/16).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: api-allow-ingress
  namespace: apps
spec:
  podSelector:
    matchLabels:
      app: api
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: 8080  # the container port the API listens on
      from:
        # Allow traffic from within the VPC — covers the ALB, other pods, and monitoring
        - ipBlock:
            cidr: 10.0.0.0/16
---
# Allow outbound HTTPS from the API pod (e.g. external service calls, AWS SDK).
# Also allows intra-cluster traffic so the API can reach other services if needed.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: api-allow-egress
  namespace: apps
spec:
  podSelector:
    matchLabels:
      app: api
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 443   # HTTPS — external APIs, AWS services
          protocol: TCP
        - port: 80    # HTTP — other in-cluster services
          protocol: TCP
