# API Deployment
# CI updates the image tag on every push to apps/api/ (see .github/workflows/ci-api.yml).
# ArgoCD detects the commit and rolls out the new version automatically.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: apps
  labels:
    app: api
spec:
  replicas: 2  # 2 replicas spread across nodes — survives a single node failure
  selector:
    matchLabels:
      app: api
  # RollingUpdate ensures zero downtime: new pods come up before old ones go down.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1        # allow 1 extra pod during the rollout
      maxUnavailable: 0  # never take a pod down before a new one is ready
  template:
    metadata:
      labels:
        app: api
    spec:
      # Spread pods across nodes so a single node failure doesn't take both down.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: api
      containers:
        - name: api
          # IMAGE TAG IS UPDATED AUTOMATICALLY BY CI — do not change manually
          image: 000000000000.dkr.ecr.ap-south-1.amazonaws.com/gitops-dev-api:latest
          imagePullPolicy: Always  # always pull — ensures latest tag is honoured
          ports:
            - containerPort: 8080
          env:
            # APP_VERSION is baked in by CI as the short git SHA (e.g. "a1b2c3d")
            # Visible in the API JSON response — confirms which commit is running
            - name: APP_VERSION
              value: "latest"
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          # Liveness probe — kubelet restarts the container if this fails 3 times.
          # Use /health (not /) so a slow response doesn't trigger a restart.
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          # Readiness probe — traffic is only sent to the pod when this passes.
          # Prevents requests hitting a pod that hasn't finished starting up.
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 2
