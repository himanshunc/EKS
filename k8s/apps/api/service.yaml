# API Service — ClusterIP (internal only).
# The ALB Ingress controller uses target-type: ip, so it talks directly to pod IPs.
# No NodePort or LoadBalancer needed — the ALB handles external traffic.
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: apps
  labels:
    app: api
spec:
  selector:
    app: api  # forwards traffic to pods with this label
  ports:
    - name: http
      port: 80        # port the Service listens on (used in Ingress backend)
      targetPort: 8080  # port the container listens on
  type: ClusterIP
