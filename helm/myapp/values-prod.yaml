# ─────────────────────────────────────────────────────────────────────────────
# values-prod.yaml — prod environment overrides
#
# Only override what differs from values.yaml.
# ArgoCD merges this on top of values.yaml when deploying to prod.
# ─────────────────────────────────────────────────────────────────────────────

replicaCount: 3   # higher availability in prod

hpa:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 60

env:
  APP_NAME: myapp
  APP_VERSION: prod
  PORT: "3000"
