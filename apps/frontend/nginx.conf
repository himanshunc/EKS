# nginx configuration for the frontend container.
# Serves static files and exposes a /health endpoint for ALB target group checks.
server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Health check endpoint — ALB calls this to verify the pod is alive.
    # Must return 200 quickly. No logging to avoid noise in access logs.
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Serve the SPA — try the file, then directory, then fall back to index.html.
    # The fallback lets client-side routing work if you add React/Vue later.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
